<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit ID Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="anchor">
    <div class="stage">
      <div class="scene">

        <!-- Lanyard + clasp -->
        <img
          class="lanyard"
          src="Image/Lanyard.png"
          alt="" draggable="false"
        />

        <!-- ID Card -->
        <div class="card">
          <img
            src="Image/Vector.png"
            alt="Orbit ID Card" draggable="false"
          />
        </div>

      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
